<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Museum Guide</title>

<style>
body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

video{
width:420px;
height:640px;
object-fit:cover;
}
</style>
</head>

<body>

<video id="video" muted autoplay playsinline></video>

<script>

const SERVER="http://localhost:5000"

const video=document.getElementById("video")

let idleURL
let talkURL

let talking=false

const audio=new Audio()


async function activate(){

const idleBlob=await fetch(SERVER+"/idle.mp4").then(r=>r.blob())
const talkBlob=await fetch(SERVER+"/talking.mp4").then(r=>r.blob())

idleURL=URL.createObjectURL(idleBlob)
talkURL=URL.createObjectURL(talkBlob)

video.src=idleURL
video.loop=true
video.play()

connectSSE()
}


audio.onplay=()=>{

talking=true

video.src=talkURL
video.loop=true
video.currentTime=0
video.play()

}

audio.onended=()=>{

talking=false

video.src=idleURL
video.loop=true
video.currentTime=0
video.play()

}


function connectSSE(){

const es=new EventSource(SERVER+"/events")

es.onmessage=(evt)=>{

let msg

try{
msg=JSON.parse(evt.data)
}catch{
return
}

if(msg.type==="speak"){

const payload=JSON.parse(msg.data)

audio.src=payload.audio_url+"&cb="+Date.now()

audio.play()

}

}

}


document.body.addEventListener("click",activate,{once:true})

</script>

</body>
</html>
